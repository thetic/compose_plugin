# .github/workflows/build.yml
# CI/CD pipeline for Compose Manager plugin
#
# This workflow automates the release process:
# - Builds TXZ package using Docker (Slackware)
# - Calculates MD5 for integrity verification
# - Creates GitHub releases with package attached
# - Updates PLG file version/MD5 in the target branch (main or dev)
#
# Triggers:
# - Automatically via tag-release.yml (creates tags on merge to main/dev)
# - Manual workflow_dispatch for testing builds
#
# Tag format:
# - Stable: vYYYY.MM.DD or vYYYY.MM.DDa
# - Beta:   vYYYY.MM.DD-dev.HHMM

name: Build & Release Plugin

on:
  push:
    tags:
      - "v20[0-9][0-9].[0-9][0-9].[0-9][0-9]*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g., 2026.02.01 or 2026.02.01-dev) - leave empty for test build"
        required: false
        default: ""

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  PLUGIN_NAME: compose.manager

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      md5: ${{ steps.hash.outputs.MD5 }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read component versions
        run: |
          while IFS='=' read -r key value; do
            [[ "$key" =~ ^#.*$ || -z "$key" ]] && continue
            echo "$key=$value" >> "$GITHUB_ENV"
          done < versions.env

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/v* ]]; then
            # Release tag - extract version (remove 'v' prefix)
            VERSION="${GITHUB_REF#refs/tags/v}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            # Manual input
            VERSION="${{ github.event.inputs.version }}"
          else
            # Test build - use date + git SHA
            VERSION="$(date +%Y.%m.%d)-dev.$(git rev-parse --short HEAD)"
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"

      - name: Build TXZ package in Docker
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"

          # Set executable permissions
          chmod +x ./build_in_docker.sh
          chmod +x ./source/pkg_build.sh

          # Build using the Slackware Docker container
          docker run --rm --tmpfs /tmp \
            -v $PWD/archive:/mnt/output:rw \
            -v $PWD/source:/mnt/source:ro \
            -e TZ="America/New_York" \
            -e COMPOSE_VERSION="$COMPOSE_VERSION" \
            -e ACE_VERSION="$ACE_VERSION" \
            -e OUTPUT_FOLDER="/mnt/output" \
            -e PKG_VERSION="${VERSION}" \
            vbatts/slackware:latest /mnt/source/pkg_build.sh

          # Verify package was created
          ls -la ./archive/
          if [[ ! -f "./archive/${{ env.PLUGIN_NAME }}-package-${VERSION}.txz" ]]; then
            echo "ERROR: Package not found!"
            exit 1
          fi

      - name: Calculate hash
        id: hash
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          PACKAGE="./archive/${{ env.PLUGIN_NAME }}-package-${VERSION}.txz"

          MD5=$(md5sum "$PACKAGE" | cut -d' ' -f1)
          echo "MD5=${MD5}" >> $GITHUB_OUTPUT
          echo "Package MD5: ${MD5}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: plugin-package
          path: |
            archive/*.txz
            archive/release_info
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Determine release type
        id: release_type
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          if [[ "$VERSION" == *"-dev"* ]]; then
            echo "is_beta=true" >> $GITHUB_OUTPUT
            echo "target_branch=dev" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
            echo "Release type: BETA (dev branch)"
          else
            echo "is_beta=false" >> $GITHUB_OUTPUT
            echo "target_branch=main" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
            echo "Release type: STABLE (main branch)"
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release_type.outputs.target_branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: plugin-package
          path: artifacts/

      - name: Prepare release notes
        id: notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          TARGET_BRANCH="${{ steps.release_type.outputs.target_branch }}"
          IS_BETA="${{ steps.release_type.outputs.is_beta }}"

          # Read component versions from release_info
          if [[ -f artifacts/release_info ]]; then
            COMPONENTS=$(cat artifacts/release_info)
          else
            COMPONENTS="See release artifacts for component versions"
          fi

          # Beta-specific: find PR and latest stable tag for diff link
          PR_SECTION=""
          if [[ "$IS_BETA" == "true" ]]; then
            TITLE="Compose Manager v${VERSION} (Beta)"
            INSTALL_NOTE="**Beta Release** - Install from the beta channel for testing."

            PR_NUMBER=$(gh pr list --repo "${{ github.repository }}" --head dev --base main --state open --json number --jq '.[0].number // empty')
            LATEST_STABLE=$(git tag -l 'v*' | grep -v '\-dev' | sort -V | tail -1)

            if [[ -n "$PR_NUMBER" || -n "$LATEST_STABLE" ]]; then
              PR_SECTION=$'\n### Links\n'
              if [[ -n "$PR_NUMBER" ]]; then
                PR_SECTION+="- [PR #${PR_NUMBER}](https://github.com/${{ github.repository }}/pull/${PR_NUMBER})"$'\n'
              fi
              if [[ -n "$LATEST_STABLE" ]]; then
                PR_SECTION+="- [Beta release diff](https://github.com/${{ github.repository }}/compare/${LATEST_STABLE}...v${VERSION})"$'\n'
              fi
            fi
          else
            TITLE="Compose Manager v${VERSION}"
            INSTALL_NOTE=""
          fi

          # Create release body
          cat > release_body.md << EOF
          ## ${TITLE}

          ${INSTALL_NOTE}
          ${PR_SECTION}

          ### Installation

          **Via Plugin Manager:**
          \`\`\`
          https://raw.githubusercontent.com/${{ github.repository }}/${TARGET_BRANCH}/${{ env.PLUGIN_NAME }}.plg
          \`\`\`

          ### Package Details
          - **MD5:** \`${{ needs.build.outputs.md5 }}\`

          ### Components
          ${COMPONENTS}
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Compose Manager v${{ needs.build.outputs.version }}${{ steps.release_type.outputs.is_beta == 'true' && ' (Beta)' || '' }}"
          body_path: release_body.md
          files: |
            artifacts/*.txz
          fail_on_unmatched_files: true
          draft: false
          prerelease: ${{ steps.release_type.outputs.prerelease == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update PLG in target branch
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          MD5="${{ needs.build.outputs.md5 }}"
          TARGET_BRANCH="${{ steps.release_type.outputs.target_branch }}"

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Update version and MD5 in PLG
          sed -i \
            -e "s|<!ENTITY version.*\".*\"|<!ENTITY version     \"${VERSION}\"|" \
            -e "s|<!ENTITY packageMD5.*\".*\"|<!ENTITY packageMD5  \"${MD5}\"|" \
            ${{ env.PLUGIN_NAME }}.plg

          echo "Updated PLG file:"
          head -20 ${{ env.PLUGIN_NAME }}.plg

          # Commit and push
          git add ${{ env.PLUGIN_NAME }}.plg
          git commit -m "Release v${VERSION} [skip ci]" || echo "No changes to commit"
          git push origin ${TARGET_BRANCH}
