name: Tests
permissions:
  contents: read
  packages: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  push:
    branches: [main, dev]
    paths:
      - 'source/compose.manager/**'
      - 'tests/**'
      - 'versions.env'
      - 'phpunit.xml'
      - 'phpstan.neon'
      - 'composer.json'
  pull_request:
    branches: [main, dev]
    paths:
      - 'source/compose.manager/**'
      - 'tests/**'
      - 'versions.env'
      - 'phpunit.xml'
      - 'phpstan.neon'
      - 'composer.json'
  workflow_dispatch:

jobs:
  php-tests:
    name: PHP Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: json, curl, mbstring
          coverage: xdebug
      
      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
      
      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-
      
      - name: Install dependencies
        run: composer install --prefer-dist --no-progress
      
      - name: Create test output directories
        run: mkdir -p tests/results tests/coverage
      
      - name: Run PHPUnit tests
        run: vendor/bin/phpunit --coverage-clover tests/coverage/clover.xml --log-junit tests/results/junit.xml
      
      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: php-test-results
          path: tests/results/
      
      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: ${{ always() && hashFiles('tests/coverage/**') != '' }}
        with:
          name: php-coverage
          path: tests/coverage/
      

  bash-tests:
    name: BATS Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive
      
      - name: Setup BATS
        uses: mig4/setup-bats@v1
        with:
          bats-version: 1.10.0
      
      - name: Install BATS helpers
        run: |
          # Install bats-support and bats-assert
          git clone https://github.com/bats-core/bats-support.git tests/bats-support
          git clone https://github.com/bats-core/bats-assert.git tests/bats-assert
      
      - name: Create test output directory
        run: mkdir -p tests/results
      
      - name: Run BATS tests
        run: |
          bats tests/unit/*.bats --formatter junit > tests/results/bats-junit.xml || true
          bats tests/unit/*.bats --formatter tap
      
      - name: Upload BATS results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: bats-test-results
          path: tests/results/
      

  lint:
    name: Static Analysis
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: phpstan
      
      - name: Install dependencies
        run: composer install --prefer-dist --no-progress
      
      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --error-format=github
